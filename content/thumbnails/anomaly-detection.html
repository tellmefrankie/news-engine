<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1000px;
    height: 420px;
    background: linear-gradient(135deg, #1a0533 0%, #2d1b69 50%, #1a0533 100%);
    font-family: -apple-system, 'SF Pro Display', 'Segoe UI', system-ui, sans-serif;
    overflow: hidden;
    position: relative;
  }

  /* Grid pattern overlay */
  body::before {
    content: '';
    position: absolute;
    inset: 0;
    background-image:
      linear-gradient(#4c1d9522 1px, transparent 1px),
      linear-gradient(90deg, #4c1d9522 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
  }

  /* Glow effect */
  body::after {
    content: '';
    position: absolute;
    top: -50%;
    left: 20%;
    width: 60%;
    height: 200%;
    background: radial-gradient(ellipse, #a78bfa15 0%, transparent 70%);
    pointer-events: none;
  }

  .container {
    position: relative;
    z-index: 1;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    height: 100%;
    padding: 40px 52px;
  }

  .top {
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .tag {
    background: #2e1065;
    color: #e9d5ff;
    font-size: 14px;
    font-weight: 600;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    padding: 6px 14px;
    border-radius: 6px;
    border: 1px solid #a78bfa40;
  }

  .metric-block {
    text-align: right;
  }

  .metric-value {
    font-size: 32px;
    font-weight: 800;
    color: #c4b5fd;
    line-height: 1;
    font-variant-numeric: tabular-nums;
  }

  .metric-label {
    font-size: 11px;
    color: #c4b5fd;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin-top: 4px;
  }

  .middle {
    flex: 1;
    display: flex;
    align-items: center;
    padding: 20px 0;
  }

  .title {
    font-size: 34px;
    font-weight: 800;
    color: #faf5ff;
    line-height: 1.25;
    max-width: 820px;
    letter-spacing: -0.02em;
  }

  .title em {
    color: #c4b5fd;
    font-style: normal;
  }

  .subtitle {
    font-size: 18px;
    color: #c4b5fd;
    line-height: 1.5;
    margin-top: 12px;
    max-width: 720px;
  }

  .bottom {
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .author {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .author-dot {
    width: 8px;
    height: 8px;
    background: #a78bfa;
    border-radius: 50%;
  }

  .author-name {
    font-size: 14px;
    color: #c4b5fd;
    font-weight: 500;
  }

  .accent-line {
    width: 48px;
    height: 3px;
    background: linear-gradient(90deg, #a78bfa, transparent);
    border-radius: 2px;
  }
</style>
</head>
<body>
  <div class="container">
    <div class="top">
      
    <div class="tag">#Python</div>
  
      
    <div class="metric-block">
      <div class="metric-value">6 tickers</div>
      <div class="metric-label">daily scan</div>
    </div>
  
    </div>
    <div class="middle">
      <div>
        <div class="title">How I detect options flow anomalies with <em>Claude Code</em></div>
        
    <div class="subtitle">Statistical outlier detection across 6 tickers — with real examples</div>
  
      </div>
    </div>
    <div class="bottom">
      <div class="author">
        <div class="author-dot"></div>
        <div class="author-name">tellmefrankie · dev.to</div>
      </div>
      <div class="accent-line"></div>
    </div>
  </div>
</body>
</html>
