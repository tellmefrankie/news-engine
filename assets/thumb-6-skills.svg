<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#161b22;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="greengrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#238636;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3fb950;stop-opacity:1" />
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)" />
  <rect x="0" y="0" width="1200" height="5" fill="url(#greengrad)" />

  <!-- Headline -->
  <text x="80" y="110" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="68" font-weight="700" fill="#f0f6fc">6 Claude Code Skills</text>
  <text x="80" y="180" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="68" font-weight="700" fill="#f0f6fc">for your portfolio.</text>
  <text x="80" y="235" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="30" fill="#8b949e">Open source. Built from real trading mistakes.</text>

  <!-- Skill cards - row 1 -->
  <!-- Card 1 -->
  <rect x="80" y="280" width="310" height="88" rx="8" fill="#161b22" stroke="#238636" stroke-width="1" />
  <text x="100" y="312" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="12" fill="#3fb950">01</text>
  <text x="130" y="312" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="15" font-weight="600" fill="#f0f6fc">Options Flow Analyzer</text>
  <text x="100" y="335" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="12" fill="#8b949e">Real vs lottery call separation</text>
  <text x="100" y="354" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="12" fill="#8b949e">Adj P/C + anomaly detection</text>

  <!-- Card 2 -->
  <rect x="410" y="280" width="310" height="88" rx="8" fill="#161b22" stroke="#30363d" stroke-width="1" />
  <text x="430" y="312" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="12" fill="#3fb950">02</text>
  <text x="460" y="312" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="15" font-weight="600" fill="#f0f6fc">Price Monitor &amp; Alert</text>
  <text x="430" y="335" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="12" fill="#8b949e">Stop-loss / take-profit tracking</text>
  <text x="430" y="354" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="12" fill="#8b949e">Telegram alerts, market hours aware</text>

  <!-- Card 3 -->
  <rect x="740" y="280" width="380" height="88" rx="8" fill="#161b22" stroke="#30363d" stroke-width="1" />
  <text x="760" y="312" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="12" fill="#3fb950">03</text>
  <text x="790" y="312" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="15" font-weight="600" fill="#f0f6fc">Expected Value Calculator</text>
  <text x="760" y="335" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="12" fill="#8b949e">Bull/base/bear scenario modeling</text>
  <text x="760" y="354" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="12" fill="#8b949e">Probability-weighted EV per position</text>

