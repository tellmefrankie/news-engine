  <text x="100" y="459" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="12" fill="#8b949e">Earnings + options + news combined</text>

  <!-- Card 5 -->
  <rect x="410" y="385" width="310" height="88" rx="8" fill="#161b22" stroke="#30363d" stroke-width="1" />
  <text x="430" y="417" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="12" fill="#3fb950">05</text>
  <text x="460" y="417" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="15" font-weight="600" fill="#f0f6fc">News Sentiment Engine</text>
  <text x="430" y="440" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="12" fill="#8b949e">4+ RSS feeds, deduplicated</text>
  <text x="430" y="459" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="12" fill="#8b949e">Impact scoring + commentary</text>

  <!-- Card 6 -->
  <rect x="740" y="385" width="380" height="88" rx="8" fill="#161b22" stroke="#30363d" stroke-width="1" />
  <text x="760" y="417" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="12" fill="#3fb950">06</text>
  <text x="790" y="417" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="15" font-weight="600" fill="#f0f6fc">Multi-Agent Orchestrator</text>
  <text x="760" y="440" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="12" fill="#8b949e">Runs all skills in sequence</text>
  <text x="760" y="459" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="12" fill="#8b949e">One command → full morning brief</text>

  <rect x="0" y="590" width="1200" height="40" fill="#161b22" />
  <text x="80" y="616" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="14" fill="#8b949e">github.com/tellmefrankie/ai-investment-skills</text>
  <rect x="960" y="599" width="175" height="26" rx="5" fill="#238636" />
  <text x="1047" y="617" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="14" font-weight="600" fill="#ffffff" text-anchor="middle">Free on GitHub</text>
