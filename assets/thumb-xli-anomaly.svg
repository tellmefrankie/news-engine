<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#161b22;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f85149;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ff7b72;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)" />

  <!-- Top accent bar -->
  <rect x="0" y="0" width="1200" height="5" fill="url(#accent)" />

  <!-- Left side vertical accent -->
  <rect x="60" y="80" width="4" height="120" fill="#f85149" rx="2" />

  <!-- Tag -->
  <rect x="80" y="78" width="220" height="32" rx="6" fill="#21262d" />
  <text x="190" y="99" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="13" fill="#8b949e" text-anchor="middle" letter-spacing="1">OPTIONS FLOW ALERT</text>

  <!-- Main headline -->
  <text x="80" y="160" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="58" font-weight="700" fill="#f0f6fc">XLI hit a 5.32</text>
  <text x="80" y="230" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="58" font-weight="700" fill="#f0f6fc">put/call ratio.</text>
  <text x="80" y="300" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="42" font-weight="400" fill="#8b949e">Normal range: 0.5 - 1.2</text>

  <!-- Stat card 1 -->
  <rect x="80" y="360" width="220" height="100" rx="10" fill="#161b22" stroke="#30363d" stroke-width="1" />
  <text x="190" y="398" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="13" fill="#8b949e" text-anchor="middle">P/C RATIO</text>
  <text x="190" y="440" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="38" font-weight="700" fill="#f85149" text-anchor="middle">5.32</text>

  <!-- Stat card 2 -->
  <rect x="320" y="360" width="220" height="100" rx="10" fill="#161b22" stroke="#30363d" stroke-width="1" />
  <text x="430" y="398" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="13" fill="#8b949e" text-anchor="middle">STD DEVIATIONS</text>
  <text x="430" y="440" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="38" font-weight="700" fill="#f85149" text-anchor="middle">4.5σ</text>

  <!-- Stat card 3 -->
  <rect x="560" y="360" width="220" height="100" rx="10" fill="#161b22" stroke="#30363d" stroke-width="1" />
  <text x="670" y="398" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="13" fill="#8b949e" text-anchor="middle">WEEKS SUSTAINED</text>
  <text x="670" y="440" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="38" font-weight="700" fill="#f85149" text-anchor="middle">5</text>

  <!-- Right side terminal block -->
  <rect x="820" y="80" width="320" height="200" rx="10" fill="#161b22" stroke="#30363d" stroke-width="1" />
  <rect x="820" y="80" width="320" height="36" rx="10" fill="#21262d" />
  <rect x="820" y="106" width="320" height="10" fill="#21262d" />
  <circle cx="848" cy="98" r="6" fill="#f85149" />
  <circle cx="870" cy="98" r="6" fill="#f0883e" />
  <circle cx="892" cy="98" r="6" fill="#3fb950" />
  <text x="840" y="140" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="13" fill="#3fb950">$ options:analyze --ticker XLI</text>
  <text x="840" y="162" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="12" fill="#8b949e">Raw P/C:  5.32</text>
  <text x="840" y="180" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="12" fill="#8b949e">Lottery:   8%</text>
  <text x="840" y="198" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="12" fill="#8b949e">Adj P/C:  4.89</text>
  <text x="840" y="216" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="12" fill="#f85149">INSTITUTIONAL HEDGE</text>
  <text x="840" y="252" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="12" fill="#8b949e">Baseline: 0.87 | 4.5 std dev</text>

  <!-- Bottom bar -->
  <rect x="0" y="590" width="1200" height="40" fill="#161b22" />
  <text x="80" y="616" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="14" fill="#8b949e">github.com/tellmefrankie/ai-investment-skills</text>
  <text x="1120" y="616" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="14" fill="#3fb950" text-anchor="end">Claude Code</text>
</svg>
