  <text x="100" y="434" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="12" fill="#f85149">  Bear  (25%): $2.85 → -12.6% → EV: -$205</text>
  <line x1="100" y1="445" x2="720" y2="445" stroke="#30363d" stroke-width="1" />
